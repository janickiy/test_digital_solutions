<VirtualHost *:80>
    ServerName test.janickiy.com
    ServerAlias www.test.janickiy.com

    Alias /.well-known/acme-challenge/ /var/www/letsencrypt/.well-known/acme-challenge/
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.test\.janickiy\.com$ [NC]
    RewriteRule ^ https://test.janickiy.com%{REQUEST_URI} [R=301,L]
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://test.janickiy.com%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/test-http-error.log
    CustomLog ${APACHE_LOG_DIR}/test-http-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName test.janickiy.com
    ServerAlias www.test.janickiy.com

    SSLEngine on
    Protocols h2 http/1.1
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" env=HTTPS

    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.test\.janickiy\.com$ [NC]
    RewriteRule ^ https://test.janickiy.com%{REQUEST_URI} [R=301,L]

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:4173/ connectiontimeout=5 timeout=60
    ProxyPassReverse / http://127.0.0.1:4173/
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ErrorLog ${APACHE_LOG_DIR}/test-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/test-ssl-access.log combined
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/test.janickiy.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/test.janickiy.com/privkey.pem
</VirtualHost>
